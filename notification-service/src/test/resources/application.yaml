
server:
  port: 0
  shutdown: graceful

spring:
  application:
    name: notification-service
  cloud:
    config:
      enabled: false
  rabbitmq:
    host: localhost
    port: 5672
    username: mrrabbit
    password: veryverysecretword
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 5
          initial-interval: 2s
        concurrency: 3
        max-concurrency: 10
        prefetch: 1
        declare: true
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  properties:
    notification-fanout: user.events.fanout
    notification-queue-postfix: notify.queue
  email:
    provider: javamail
